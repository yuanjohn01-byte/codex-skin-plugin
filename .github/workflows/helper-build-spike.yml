name: Helper Cross-Platform Build Spike

on:
  pull_request:
    paths:
      - '.github/workflows/helper-build-spike.yml'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - 'internal/**'
      - 'tools/build_helper.py'
      - 'tools/test_helper_builds.py'
  push:
    branches:
      - 'codex/**'
    paths:
      - '.github/workflows/helper-build-spike.yml'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - 'internal/**'
      - 'tools/build_helper.py'
      - 'tools/test_helper_builds.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproducible-cross-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true
      - name: Build twice and compare three targets
        run: python3 tools/test_helper_builds.py
      - name: Build review artifacts
        run: python3 tools/build_helper.py
      - name: Upload unsigned internal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helper-cross-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/helper
          if-no-files-found: error
          retention-days: 14

  windows-no-node-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true
      - name: Build the native Windows x64 Helper
        shell: pwsh
        run: python tools/build_helper.py --target windows-x64
      - name: Execute without Node, Python, or Go on PATH
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $helper = Resolve-Path 'dist/helper/codex-skin-helper_0.1.0-s3_windows_x64.exe'
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
          if (Get-Command node -ErrorAction SilentlyContinue) { throw 'Node remained on the smoke-test PATH' }
          if (Get-Command python -ErrorAction SilentlyContinue) { throw 'Python remained on the smoke-test PATH' }
          if (Get-Command go -ErrorAction SilentlyContinue) { throw 'Go remained on the smoke-test PATH' }

          $version = (& $helper version --json) | ConvertFrom-Json
          if (-not $version.ok -or $version.data.helperVersion -ne '0.1.0-s3') {
            throw 'Windows Helper version contract failed'
          }
          $doctor = (& $helper doctor --json) | ConvertFrom-Json
          if (-not $doctor.ok -or $doctor.data.platform -ne 'windows' -or $doctor.data.architecture -ne 'x64' -or $doctor.data.nodeRequired) {
            throw 'Windows Helper doctor contract failed'
          }

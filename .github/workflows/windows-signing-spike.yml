name: Windows Signing Feasibility Spike

on:
  pull_request:
    paths:
      - ".github/workflows/windows-signing-spike.yml"
      - "cmd/codex-skin/**"
      - "go.mod"
      - "go.sum"
      - "internal/bootstrap/**"
      - "internal/buildinfo/**"
      - "internal/cli/**"
      - "internal/credentials/**"
      - "internal/deviceauth/**"
      - "internal/protocol/**"
      - "internal/release/**"
      - "contracts/device-authorization-poll-v1.schema.json"
      - "contracts/helper-protocol-v1.schema.json"
      - "contracts/helper-release-descriptor-v1.schema.json"
      - "tools/build_helper.py"
      - "tools/test_windows_signing.ps1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  internal-self-signed-authenticode:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: Build native Windows x64 Helper
        shell: pwsh
        run: python tools/build_helper.py --target windows-x64
      - name: Sign, run, verify, tamper, and clean ephemeral certificate
        shell: pwsh
        run: ./tools/test_windows_signing.ps1
      - name: Upload non-secret feasibility summary only
        uses: actions/upload-artifact@v4
        with:
          name: windows-signing-spike-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/signing/windows-signing-spike-summary.json
          if-no-files-found: error
          retention-days: 14
